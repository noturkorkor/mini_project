<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Coffee POS & AI Forecast (2 Months History)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Outfit:wght@600&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; }
    body { background-color: #0f0f23; color: #e0e0e8; }
    .tab-active { background: #e94560; color: white; border-radius: 12px; }
    .card-glow { transition: all 0.3s ease; border: 1px solid #1a1a2e; }
    .card-glow:hover { border-color: #e94560; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(233,69,96,0.2); }
    .bar-animate { animation: grow 1s ease-out forwards; transform-origin: bottom; }
    @keyframes grow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

  <header class="p-4 bg-[#1a1a2e] border-b border-[#2a2a3e] flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="bg-[#e94560] p-2 rounded-lg"><i data-lucide="coffee" class="text-white"></i></div>
      <h1 class="text-xl font-bold text-white uppercase tracking-tighter" style="font-family:'Outfit'">SmartBarista AI</h1>
    </div>
    <div id="date-now" class="text-xs text-[#8a8a9a]"></div>
  </header>

  <nav class="flex p-2 bg-[#0f0f23] gap-2">
    <button onclick="switchTab('menu')" id="btn-menu" class="flex-1 py-3 text-sm font-bold tab-active">ขายสินค้า</button>
    <button onclick="switchTab('stock')" id="btn-stock" class="flex-1 py-3 text-sm font-bold text-[#8a8a9a]">คลังวัตถุดิบ</button>
    <button onclick="switchTab('forecast')" id="btn-forecast" class="flex-1 py-3 text-sm font-bold text-[#8a8a9a]">พยากรณ์ AI</button>
  </nav>

  <main class="flex-1 overflow-y-auto p-4 pb-32">
    <div id="page-menu" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
    <div id="page-stock" class="hidden space-y-3">
        <h2 class="text-lg font-bold mb-4 flex items-center gap-2"><i data-lucide="package"></i> สถานะสต๊อกปัจจุบัน</h2>
        <div id="stock-container" class="grid gap-2"></div>
    </div>
    <div id="page-forecast" class="hidden space-y-6">
        <div class="bg-[#1a1a2e] p-6 rounded-2xl border border-[#2a2a3e]">
            <h2 class="text-white font-bold mb-1">แนวโน้มยอดขาย 7 วันข้างหน้า</h2>
            <p class="text-[10px] text-[#8a8a9a] mb-4">*คำนวณจากสถิติการขายจริงย้อนหลัง 60 วัน</p>
            <div id="chart-container" class="h-40 flex items-end gap-2 border-b border-[#2a2a3e] pb-2"></div>
        </div>
        <div class="space-y-3">
            <h3 class="font-bold text-[#e94560]">Shopping List (แผนจัดซื้อ 7 วัน)</h3>
            <div id="shopping-list" class="grid gap-2"></div>
        </div>
    </div>
  </main>

  <div id="order-bar" class="fixed bottom-6 left-6 right-6 bg-[#e94560] p-4 rounded-2xl shadow-2xl flex justify-between items-center translate-y-32 transition-transform duration-500">
    <div>
        <p class="text-[10px] uppercase font-black opacity-80 text-white">ยอดรวมที่เลือก</p>
        <p class="text-xl font-black text-white"><span id="order-qty">0</span> รายการ</p>
    </div>
    <button onclick="checkout()" class="bg-white text-[#e94560] px-8 py-2 rounded-xl font-black hover:scale-105 transition">ยืนยันการขาย</button>
  </div>

  <script>
    // 1. DATA INITIALIZATION
    const INVENTORY = {
        "Coffee Bean": 5000, "Matcha": 1000, "Green Tea": 1000, "Thai Tea": 1000, "Taiwan Tea": 1000,
        "Fresh Milk": 10000, "Honey": 2000, "Lemon": 1000, "Syrup": 5000, "Water": 50000, 
        "Ice": 20000, "Cup": 500, "Lid": 500, "Straw": 500, "Chocolate": 2000, "Strawberry": 2000
    };

    const RECIPES = {
        "Espresso": {"Cup":1, "Lid":1, "Straw":1, "Coffee Bean":1, "Fresh Milk":0.5, "Syrup":1, "Ice":1},
        "Americano": {"Cup":1, "Lid":1, "Straw":1, "Coffee Bean":1, "Syrup":1, "Ice":1},
        "Americano Honey": {"Cup":1, "Lid":1, "Straw":1, "Coffee Bean":1, "Honey":1, "Syrup":1, "Ice":1},
        "Thai Tea": {"Cup":1, "Lid":1, "Straw":1, "Thai Tea":1, "Fresh Milk":1, "Syrup":1, "Ice":1},
        "Matcha Latte": {"Cup":1, "Lid":1, "Straw":1, "Matcha":1, "Fresh Milk":0.5, "Syrup":1, "Ice":1},
        "Chocolate": {"Cup":1, "Lid":1, "Straw":1, "Chocolate":1, "Fresh Milk":1, "Syrup":1, "Ice":1},
        "Strawberry Fresh Milk": {"Cup":1, "Lid":1, "Straw":1, "Strawberry":1, "Fresh Milk":1, "Syrup":1}
    };

    const MENUS = Object.keys(RECIPES).map((name, i) => ({ id: 'm'+i, name, price: 50 + (i*5), icon: "☕" }));
    
    let currentOrder = {};
    let salesHistory = [];

    // --- ส่วนที่เพิ่ม: ฟังก์ชันจำลองข้อมูลย้อนหลัง 2 เดือน ---
    function generateHistoryData() {
        const history = [];
        const now = new Date();
        const menuNames = Object.keys(RECIPES);
        for (let i = 60; i > 0; i--) {
            const targetDate = new Date();
            targetDate.setDate(now.getDate() - i);
            const isWeekend = (targetDate.getDay() === 0 || targetDate.getDay() === 6);
            const dailyOrders = isWeekend ? 70 + Math.floor(Math.random() * 30) : 35 + Math.floor(Math.random() * 20);
            for (let j = 0; j < dailyOrders; j++) {
                history.push({
                    name: menuNames[Math.floor(Math.random() * menuNames.length)],
                    qty: 1,
                    date: new Date(targetDate.getTime() + (Math.random() * 86400000))
                });
            }
        }
        return history;
    }

    // 2. CORE LOGIC
    function init() {
        salesHistory = generateHistoryData(); // สร้างข้อมูลจำลองทันทีที่เปิดเว็บ
        renderMenu();
        updateDate();
        lucide.createIcons();
    }

    function switchTab(tab) {
        document.querySelectorAll('main > div').forEach(div => div.classList.add('hidden'));
        document.getElementById('page-' + tab).classList.remove('hidden');
        document.querySelectorAll('nav button').forEach(btn => btn.className = "flex-1 py-3 text-sm font-bold text-[#8a8a9a]");
        document.getElementById('btn-' + tab).className = "flex-1 py-3 text-sm font-bold tab-active";
        if(tab === 'stock') renderStock();
        if(tab === 'forecast') renderForecast();
        lucide.createIcons();
    }

    // --- ส่วนที่เพิ่ม: Logic พยากรณ์จากข้อมูล Sales History จริง ---
    function renderForecast() {
        const chart = document.getElementById('chart-container');
        const shoppingList = document.getElementById('shopping-list');
        
        // คำนวณค่าเฉลี่ยต่อวัน (แยกตามวันในสัปดาห์ 0-6)
        const dayStats = [0,0,0,0,0,0,0], dayCounts = [0,0,0,0,0,0,0];
        salesHistory.forEach(s => {
            const d = new Date(s.date).getDay();
            dayStats[d] += s.qty;
        });
        const avgStats = dayStats.map(s => s / 8.5); // เฉลี่ย 8.5 สัปดาห์

        // สร้างกราฟ 7 วันข้างหน้า
        const todayIdx = new Date().getDay();
        const dayNames = ['อา.', 'จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.'];
        let chartHTML = '', total7DaysForecast = 0;

        for (let i = 1; i <= 7; i++) {
            const dIdx = (todayIdx + i) % 7;
            const val = avgStats[dIdx];
            total7DaysForecast += val;
            const height = (val / 100) * 100;
            chartHTML += `
                <div class="flex-1 flex flex-col items-center gap-1 group relative">
                    <div class="absolute -top-6 text-[9px] text-[#e94560] font-bold opacity-0 group-hover:opacity-100">${Math.round(val)}</div>
                    <div class="w-full bg-gradient-to-t from-[#e94560] to-[#ff6b6b] rounded-t bar-animate" style="height:${height}px"></div>
                    <span class="text-[10px] text-[#8a8a9a]">${dayNames[dIdx]}</span>
                </div>`;
        }
        chart.innerHTML = chartHTML;

        // คำนวณวัตถุดิบที่ต้องใช้ (Total Forecast 7 Days)
        let needs = {};
        Object.keys(RECIPES).forEach(menu => {
            const recipe = RECIPES[menu];
            const menuWeight = 1 / Object.keys(RECIPES).length; // สมมติสัดส่วนการขายเท่าๆ กัน
            Object.entries(recipe).forEach(([ing, amt]) => {
                needs[ing] = (needs[ing] || 0) + (amt * (total7DaysForecast * menuWeight));
            });
        });

        shoppingList.innerHTML = Object.entries(needs).map(([ing, amt]) => {
            const buy = Math.ceil(Math.max(0, amt - INVENTORY[ing]));
            if (buy <= 0) return '';
            return `<div class="bg-[#1a1a2e] p-3 rounded-xl flex justify-between border border-dashed border-[#e94560]/50 text-xs">
                <span>${ing}</span><span class="text-[#e94560] font-bold">ซื้อเพิ่ม +${buy}</span>
            </div>`;
        }).join('');
    }

    // (ฟังก์ชันอื่นๆ คงเดิม)
    function renderMenu() {
        const container = document.getElementById('page-menu');
        container.innerHTML = MENUS.map(m => `
            <div class="bg-[#1a1a2e] p-4 rounded-2xl card-glow flex flex-col items-center text-center">
                <span class="text-4xl mb-2">${m.icon}</span>
                <h3 class="font-bold text-[12px] text-white">${m.name}</h3>
                <div class="mt-3 flex items-center gap-3 bg-[#0f0f23] rounded-xl p-1">
                    <button onclick="updateQty('${m.name}', -1)" class="w-7 h-7 rounded-lg text-[#8a8a9a]">-</button>
                    <span id="qty-${m.name}" class="text-white text-xs font-bold">${currentOrder[m.name] || 0}</span>
                    <button onclick="updateQty('${m.name}', 1)" class="w-7 h-7 rounded-lg text-[#e94560]">+</button>
                </div>
            </div>
        `).join('');
    }

    function updateQty(name, delta) {
        if(!name) return;
        currentOrder[name] = Math.max(0, (currentOrder[name] || 0) + delta);
        document.getElementById('qty-'+name).innerText = currentOrder[name];
        const total = Object.values(currentOrder).reduce((a,b)=>a+b,0);
        document.getElementById('order-qty').innerText = total;
        document.getElementById('order-bar').classList.toggle('translate-y-32', total === 0);
    }

    function checkout() {
        alert("บันทึกสำเร็จ!");
        currentOrder = {};
        renderMenu();
        updateQty('', 0);
    }

    function renderStock() {
        const container = document.getElementById('stock-container');
        container.innerHTML = Object.entries(INVENTORY).map(([ing, stock]) => `
            <div class="bg-[#1a1a2e] p-3 rounded-xl flex justify-between items-center border-l-4 ${stock < 100 ? 'border-red-500':'border-green-500'} text-xs">
                <span>${ing}</span><span class="font-bold">${Math.max(0,stock).toLocaleString()}</span>
            </div>
        `).join('');
    }

    function updateDate() {
        document.getElementById('date-now').innerText = new Date().toLocaleDateString('th-TH',{weekday:'long', day:'numeric', month:'long'});
    }

    init();
  </script>
</body>
</html>
