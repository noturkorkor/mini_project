<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Coffee POS & Forecast</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; }
    .tab-active { background: #e94560; color: white; box-shadow: 0 4px 15px rgba(233,69,96,0.3); }
    .tab-inactive { background: #1a1a2e; color: #8a8a9a; }
    .card-glow:hover { box-shadow: 0 0 20px rgba(233,69,96,0.2); transform: translateY(-2px); }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 10px; }
    @keyframes barGrow { from { height: 0; } }
    .bar-animate { animation: barGrow 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards; }
  </style>
</head>
<body class="h-full bg-[#0f0f23] text-[#e0e0e8] flex flex-col overflow-hidden">

  <header class="flex items-center justify-between px-6 py-4 bg-[#1a1a2e] border-b border-[#2a2a3e]">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-[#e94560] flex items-center justify-center shadow-lg">
        <i data-lucide="coffee" class="w-6 h-6 text-white"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold text-white leading-tight" style="font-family:'Outfit',sans-serif">BARISTA PRO</h1>
        <p id="date-display" class="text-[10px] text-[#8a8a9a] uppercase tracking-wider"></p>
      </div>
    </div>
    <div class="flex gap-2">
       <div id="status-indicator" class="flex items-center gap-2 px-3 py-1 bg-[#0f0f23] rounded-full border border-[#2a2a3e]">
          <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
          <span class="text-[10px] font-bold text-green-500">SYSTEM READY</span>
       </div>
    </div>
  </header>

  <nav class="flex gap-2 px-6 py-4 bg-[#0f0f23]">
    <button onclick="switchTab('menu')" id="tab-menu" class="tab-active flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2">
      <i data-lucide="layout-grid" class="w-4 h-4"></i> เมนู
    </button>
    <button onclick="switchTab('stock')" id="tab-stock" class="tab-inactive flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2">
      <i data-lucide="package" class="w-4 h-4"></i> สต๊อก
    </button>
    <button onclick="switchTab('forecast')" id="tab-forecast" class="tab-inactive flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2">
      <i data-lucide="trending-up" class="w-4 h-4"></i> พยากรณ์
    </button>
  </nav>

  <main class="flex-1 overflow-y-auto px-6 pb-24 custom-scroll">
    
    <div id="page-menu" class="space-y-4">
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="menu-grid">
        </div>
    </div>

    <div id="page-stock" class="hidden space-y-4">
      <div class="flex justify-between items-center">
        <h2 class="text-xl font-bold text-white">คลังวัตถุดิบ</h2>
        <button onclick="openStockModal()" class="bg-[#e94560] px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2">
          <i data-lucide="plus-circle" class="w-4 h-4"></i> เติมของ
        </button>
      </div>
      <div id="stock-list" class="grid gap-3"></div>
    </div>

    <div id="page-forecast" class="hidden space-y-6">
      <div class="bg-[#1a1a2e] p-6 rounded-2xl">
        <h2 class="text-white font-bold mb-6 flex items-center gap-2">
          <i data-lucide="calendar" class="w-5 h-5 text-[#e94560]"></i> พยากรณ์ความต้องการ (7 วัน)
        </h2>
        <div id="forecast-chart" class="h-48 flex items-end gap-3 border-b border-[#2a2a3e] pb-2">
          </div>
      </div>
      <div class="space-y-3">
        <h3 class="text-white font-bold">รายการที่ต้องเตรียมซื้อเพิ่ม</h3>
        <div id="shopping-list" class="grid gap-2"></div>
      </div>
    </div>

  </main>

  <div id="order-bar" class="fixed bottom-6 left-6 right-6 transform translate-y-32 transition-all duration-500 z-40">
    <div class="bg-[#e94560] p-4 rounded-2xl shadow-2xl flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="bg-white/20 w-12 h-12 rounded-xl flex items-center justify-center">
          <i data-lucide="shopping-cart" class="text-white w-6 h-6"></i>
        </div>
        <div>
          <p class="text-white/80 text-xs font-bold uppercase">ยอดรวมที่เลือก</p>
          <p class="text-white text-xl font-black"><span id="order-total-count">0</span> รายการ</p>
        </div>
      </div>
      <button onclick="processOrder()" class="bg-white text-[#e94560] px-8 py-3 rounded-xl font-black hover:bg-gray-100 transition active:scale-95">
        สั่งซื้อเลย
      </button>
    </div>
  </div>

  <div id="modal-overlay" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-6 backdrop-blur-sm">
    <div class="bg-[#1a1a2e] w-full max-w-md rounded-3xl p-6 border border-[#2a2a3e]">
      <h3 class="text-xl font-bold text-white mb-4">เติมสต๊อก</h3>
      <div class="space-y-4">
        <div>
          <label class="text-xs text-[#8a8a9a] block mb-1">เลือกวัตถุดิบ</label>
          <select id="modal-ing-select" class="w-full bg-[#0f0f23] border border-[#2a2a3e] p-3 rounded-xl text-white"></select>
        </div>
        <div>
          <label class="text-xs text-[#8a8a9a] block mb-1">จำนวน</label>
          <input type="number" id="modal-ing-qty" class="w-full bg-[#0f0f23] border border-[#2a2a3e] p-3 rounded-xl text-white" value="100">
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="closeStockModal()" class="flex-1 py-3 text-[#8a8a9a] font-bold">ยกเลิก</button>
          <button onclick="confirmAddStock()" class="flex-1 py-3 bg-[#e94560] text-white rounded-xl font-bold">ยืนยันการเติม</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed top-6 right-6 z-[60] transform translate-x-full transition-all duration-300"></div>

  <script>
    // --- 1. Data Initialization (อ้างอิงจากไฟล์ที่คุณให้มา) ---
    // หมายเหตุ: ในระบบจริงจะดึงผ่าน window.dataSdk.get() แต่เราสร้างโครงสร้างตามไฟล์ Ingredients.csv
    const INGREDIENTS_DATA = [
      { menu: 'Espresso', item: 'Coffee Bean', qty: 1.0 },
      { menu: 'Espresso', item: 'Fresh Milk', qty: 0.5 },
      { menu: 'Espresso', item: 'Cup', qty: 1.0 },
      { menu: 'Americano', item: 'Coffee Bean', qty: 1.0 },
      { menu: 'Americano', item: 'Water', qty: 1.0 },
      { menu: 'Americano', item: 'Cup', qty: 1.0 },
      { menu: 'Matcha Latte', item: 'Matcha', qty: 1.0 },
      { menu: 'Matcha Latte', item: 'Fresh Milk', qty: 0.5 },
      { menu: 'Thai Tea', item: 'Thai Tea', qty: 1.0 },
      { menu: 'Thai Tea', item: 'Fresh Milk', qty: 1.0 },
      // ... ระบบจะดึงอัตโนมัติจากชุดข้อมูล
    ];

    // จำลอง Inventory จากไฟล์ inventory.csv
    let inventory = {
      "Coffee Bean": 5000,
      "Matcha": 1000,
      "Thai Tea": 1000,
      "Fresh Milk": 10000,
      "Water": 50000,
      "Cup": 500,
      "Lid": 500,
      "Straw": 500,
      "Syrup": 5000,
      "Ice": 20000
    };

    // สร้างรายชื่อเมนูที่ไม่ซ้ำ
    const MENU_LIST = [
      { id: 'esp', name: 'Espresso', icon: '☕', price: 50 },
      { id: 'ame', name: 'Americano', icon: '🥤', price: 55 },
      { id: 'mat', name: 'Matcha Latte', icon: '🍵', price: 70 },
      { id: 'tte', name: 'Thai Tea', icon: '🧡', price: 60 },
      { id: 'cho', name: 'Chocolate', icon: '🍫', price: 65 },
      { id: 'sfr', name: 'Strawberry Milk', icon: '🍓', price: 75 }
    ];

    let currentOrder = {};
    let salesHistory = [];

    // --- 2. Core Logic ---
    function init() {
      renderMenu();
      updateDate();
      lucide.createIcons();
    }

    function updateDate() {
      const now = new Date();
      document.getElementById('date-display').textContent = now.toLocaleDateString('th-TH', { 
        weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' 
      });
    }

    function switchTab(tab) {
      document.querySelectorAll('main > div').forEach(d => d.classList.add('hidden'));
      document.getElementById(`page-${tab}`).classList.remove('hidden');
      
      document.querySelectorAll('nav button').forEach(b => {
        b.className = 'tab-inactive flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2';
      });
      document.getElementById(`tab-${tab}`).className = 'tab-active flex-1 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2';

      if(tab === 'stock') renderStock();
      if(tab === 'forecast') renderForecast();
      lucide.createIcons();
    }

    // --- 3. Menu & Ordering ---
    function renderMenu() {
      const grid = document.getElementById('menu-grid');
      grid.innerHTML = MENU_LIST.map(item => {
        const count = currentOrder[item.id] || 0;
        const isAvailable = checkStockAvailable(item.name);
        return `
          <div class="bg-[#1a1a2e] p-4 rounded-2xl card-glow border border-[#2a2a3e] relative overflow-hidden transition-all ${!isAvailable ? 'opacity-60 grayscale' : ''}">
            <div class="text-4xl mb-3">${item.icon}</div>
            <h3 class="font-bold text-white text-sm mb-1">${item.name}</h3>
            <p class="text-[#e94560] font-black text-lg">฿${item.price}</p>
            
            <div class="mt-4 flex items-center justify-between">
              <button onclick="updateQty('${item.id}', -1)" class="w-8 h-8 rounded-lg bg-[#0f0f23] flex items-center justify-center text-[#8a8a9a]">-</button>
              <span class="font-bold text-white">${count}</span>
              <button onclick="updateQty('${item.id}', 1)" class="w-8 h-8 rounded-lg bg-[#e94560] flex items-center justify-center text-white" ${!isAvailable ? 'disabled' : ''}>+</button>
            </div>
            ${!isAvailable ? '<div class="absolute inset-0 flex items-center justify-center bg-black/40 font-bold text-red-400 rotate-12 border-2 border-red-400 m-4 h-fit py-1">OUT OF STOCK</div>' : ''}
          </div>
        `;
      }).join('');
    }

    function checkStockAvailable(menuName) {
      // ตรวจสอบวัตถุดิบรายแก้ว (จำลองการดึงจาก CSV)
      const needs = [
        { item: 'Cup', qty: 1 },
        { item: 'Lid', qty: 1 },
        { item: 'Straw', qty: 1 }
      ];
      // สมมติว่าทุกเมนูต้องใช้ 3 อย่างนี้เป็นพื้นฐาน
      return needs.every(n => inventory[n.item] >= n.qty);
    }

    function updateQty(id, delta) {
      currentOrder[id] = Math.max(0, (currentOrder[id] || 0) + delta);
      const total = Object.values(currentOrder).reduce((a, b) => a + b, 0);
      
      const bar = document.getElementById('order-bar');
      if (total > 0) {
        bar.classList.remove('translate-y-32');
        document.getElementById('order-total-count').textContent = total;
      } else {
        bar.classList.add('translate-y-32');
      }
      renderMenu();
    }

    async function processOrder() {
      // หักสต๊อกจริง
      for (const [id, qty] of Object.entries(currentOrder)) {
        if (qty <= 0) continue;
        const menu = MENU_LIST.find(m => m.id === id);
        // ในระบบจริงจะลูปตัดวัตถุดิบตามไฟล์ CSV
        inventory["Cup"] -= qty;
        inventory["Lid"] -= qty;
        inventory["Straw"] -= qty;
        salesHistory.push({ menu: menu.name, qty, time: new Date() });
      }

      showToast("บันทึกออเดอร์สำเร็จ!", "success");
      currentOrder = {};
      updateQty(); 
      renderMenu();
    }

    // --- 4. Stock Management ---
    function renderStock() {
      const list = document.getElementById('stock-list');
      list.innerHTML = Object.entries(inventory).map(([name, stock]) => {
        const isLow = stock < 50;
        return `
          <div class="bg-[#1a1a2e] p-4 rounded-xl border border-[#2a2a3e] flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-2 h-10 rounded-full ${isLow ? 'bg-red-500' : 'bg-green-500'}"></div>
              <div>
                <p class="text-white font-bold text-sm">${name}</p>
                <p class="text-[10px] text-[#8a8a9a] uppercase">คงเหลือในระบบ</p>
              </div>
            </div>
            <div class="text-right">
              <p class="text-white font-black text-lg">${stock.toLocaleString()}</p>
              <p class="text-[10px] ${isLow ? 'text-red-400' : 'text-[#8a8a9a]'} font-bold">
                ${isLow ? '⚠️ ต่ำกว่าเกณฑ์' : 'ปกติ'}
              </p>
            </div>
          </div>
        `;
      }).join('');
    }

    function openStockModal() {
      const select = document.getElementById('modal-ing-select');
      select.innerHTML = Object.keys(inventory).map(k => `<option value="${k}">${k}</option>`).join('');
      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeStockModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
    }

    function confirmAddStock() {
      const item = document.getElementById('modal-ing-select').value;
      const amt = parseInt(document.getElementById('modal-ing-qty').value);
      inventory[item] += amt;
      showToast(`เติม ${item} จำนวน ${amt} แล้ว`, "success");
      closeStockModal();
      renderStock();
    }

    // --- 5. Forecast Logic ---
    function renderForecast() {
      const chart = document.getElementById('forecast-chart');
      const days = ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.'];
      
      // คำนวณความต้องการล่วงหน้า (Mock logic based on average sales)
      const baseDemand = 45;
      
      chart.innerHTML = days.map((day, i) => {
        const value = baseDemand + (Math.random() * 20); // จำลองอัลกอริทึมพยากรณ์
        const height = (value / 80) * 100;
        return `
          <div class="flex-1 flex flex-col items-center gap-2 group cursor-help">
            <div class="relative w-full flex justify-center">
               <span class="absolute -top-6 text-[10px] font-bold text-[#e94560] opacity-0 group-hover:opacity-100 transition-opacity">${Math.round(value)}</span>
               <div class="w-4/5 bg-gradient-to-t from-[#e94560] to-[#ff6b6b] rounded-t-lg bar-animate" style="height: ${height}%; animation-delay: ${i*0.1}s"></div>
            </div>
            <span class="text-[10px] font-bold text-[#8a8a9a]">${day}</span>
          </div>
        `;
      }).join('');

      // Shopping List
      const shopList = document.getElementById('shopping-list');
      const needsBuy = Object.entries(inventory).filter(([_, v]) => v < 100);
      
      if(needsBuy.length === 0) {
        shopList.innerHTML = `<div class="text-center py-8 text-[#8a8a9a] text-sm">วัตถุดิบเพียงพอสำหรับ 7 วันข้างหน้า</div>`;
      } else {
        shopList.innerHTML = needsBuy.map(([name, v]) => `
          <div class="bg-[#1a1a2e] p-3 rounded-xl border border-dashed border-[#e94560]/30 flex justify-between items-center">
            <span class="text-white text-sm font-bold">${name}</span>
            <span class="text-[#e94560] text-xs font-bold">ควรซื้อเพิ่มอย่างน้อย ${200 - v} หน่วย</span>
          </div>
        `).join('');
      }
    }

    // --- Utility ---
    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.innerHTML = `
        <div class="bg-[#1a1a2e] border-l-4 border-[#e94560] px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3">
          <i data-lucide="bell" class="w-5 h-5 text-[#e94560]"></i>
          <span class="text-white font-bold text-sm">${msg}</span>
        </div>
      `;
      t.classList.remove('translate-x-full');
      lucide.createIcons();
      setTimeout(() => t.classList.add('translate-x-full'), 3000);
    }

    window.onload = init;
  </script>
</body>
</html>
