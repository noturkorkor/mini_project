<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee BI - End of Day Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Outfit:wght@600&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; }
    body { background-color: #0f0f23; color: #e0e0e8; }
    .tab-active { color: #e94560; border-bottom: 3px solid #e94560; }
    .input-box { 
        background: #1a1a2e; 
        border: 2px solid #2a2a3e; 
        color: #e94560; 
        font-weight: bold;
        font-size: 1.25rem;
        border-radius: 1rem; 
        width: 100%; 
        padding: 0.75rem;
        text-align: center;
        transition: all 0.3s;
    }
    .input-box:focus { border-color: #e94560; outline: none; background: #252545; }
    .card-item { background: #1a1a2e; border-radius: 1.5rem; padding: 1.25rem; border: 1px solid #2a2a3e; }
    .btn-save { background: linear-gradient(to right, #e94560, #ff6b6b); color: white; padding: 1.25rem; border-radius: 1.25rem; font-weight: 800; width: 100%; box-shadow: 0 10px 20px rgba(233,69,96,0.3); }
    .btn-save:active { transform: scale(0.98); }
    .custom-scroll::-webkit-scrollbar { width: 0; }
  </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

  <header class="p-6 bg-[#1a1a2e] border-b border-[#2a2a3e] flex justify-between items-center">
    <div>
        <h1 class="text-2xl font-black text-white tracking-tighter" style="font-family:'Outfit'">BARISTA <span class="text-[#e94560]">BI</span></h1>
        <p class="text-[10px] text-[#8a8a9a] uppercase tracking-widest">Daily Closing Report</p>
    </div>
    <div id="date-display" class="text-xs font-bold text-[#e94560]"></div>
  </header>

  <nav class="flex bg-[#1a1a2e] border-b border-[#2a2a3e] px-2">
    <button onclick="switchTab('report')" id="btn-report" class="flex-1 py-4 text-xs font-bold tab-active uppercase">สรุปยอดขาย</button>
    <button onclick="switchTab('stock')" id="btn-stock" class="flex-1 py-4 text-xs font-bold text-[#8a8a9a] uppercase">สต๊อก</button>
    <button onclick="switchTab('history')" id="btn-history" class="flex-1 py-4 text-xs font-bold text-[#8a8a9a] uppercase">ประวัติ</button>
    <button onclick="switchTab('forecast')" id="btn-forecast" class="flex-1 py-4 text-xs font-bold text-[#8a8a9a] uppercase">พยากรณ์</button>
  </nav>

  <main class="flex-1 overflow-y-auto p-5 pb-24 custom-scroll">
    
    <div id="page-report" class="space-y-4">
        <div class="flex items-center gap-2 mb-4">
            <i data-lucide="pen-tool" class="text-[#e94560] w-4 h-4"></i>
            <h2 class="text-sm font-bold text-[#8a8a9a]">กรอกจำนวนแก้วที่ขายได้วันนี้</h2>
        </div>
        <div id="input-list" class="grid gap-4"></div>
        <div class="pt-4">
            <button onclick="saveClosingReport()" class="btn-save uppercase tracking-tighter text-lg">บันทึกปิดยอดขาย</button>
        </div>
    </div>

    <div id="page-stock" class="hidden space-y-2">
        <h2 class="text-lg font-bold mb-4">คลังวัตถุดิบปัจจุบัน</h2>
        <div id="stock-list" class="grid gap-2 text-sm"></div>
    </div>

    <div id="page-history" class="hidden space-y-3">
        <h2 class="text-lg font-bold mb-4">ยอดขายรายวันย้อนหลัง</h2>
        <div id="history-list" class="grid gap-2"></div>
    </div>

    <div id="page-forecast" class="hidden space-y-4">
        <div class="bg-[#e94560] p-6 rounded-[2rem] text-white">
            <h3 class="font-black text-xl">Shopping List</h3>
            <p class="text-xs opacity-80">วัตถุดิบที่ควรเตรียมเพิ่มสำหรับวันพรุ่งนี้</p>
        </div>
        <div id="shopping-list" class="grid gap-2"></div>
    </div>

  </main>

  <script>
    // ข้อมูลวัตถุดิบและสูตร (ตามไฟล์ที่คุณให้มา)
    let INVENTORY = {
        "Coffee Bean": 5000, "Matcha": 1000, "Green Tea": 1000, "Thai Tea": 1000, "Taiwan Tea": 1000,
        "Fresh Milk": 10000, "Honey": 2000, "Lemon": 1000, "Syrup": 5000, "Water": 50000, 
        "Ice": 20000, "Cup": 500, "Lid": 500, "Straw": 500, "Chocolate": 2000, "Strawberry": 2000, "Orange": 2000
    };

    const RECIPES = {
        "Espresso": {"Cup":1, "Lid":1, "Straw":1, "Coffee Bean":1, "Fresh Milk":0.5, "Syrup":1, "Ice":1},
        "Americano": {"Cup":1, "Lid":1, "Straw":1, "Coffee Bean":1, "Syrup":1, "Ice":1},
        "Americano Honey": {"Cup":1, "Lid":1, "Straw":1, "Coffee Bean":1, "Honey":1, "Syrup":1, "Ice":1},
        "Matcha Latte": {"Cup":1, "Lid":1, "Straw":1, "Matcha":1, "Fresh Milk":0.5, "Syrup":1, "Ice":1},
        "Thai Tea": {"Cup":1, "Lid":1, "Straw":1, "Thai Tea":1, "Fresh Milk":1, "Syrup":1, "Ice":1},
        "Chocolate": {"Cup":1, "Lid":1, "Straw":1, "Chocolate":1, "Fresh Milk":1, "Syrup":1, "Ice":1},
        "Strawberry Fresh Milk": {"Cup":1, "Lid":1, "Straw":1, "Strawberry":1, "Fresh Milk":1, "Syrup":1}
    };

    let salesHistory = [];

    function init() {
        // จำลองข้อมูลย้อนหลัง 2 เดือนเพื่อเป็นฐานข้อมูลพยากรณ์
        generateSampleHistory();
        renderInputPage();
        document.getElementById('date-display').innerText = new Date().toLocaleDateString('th-TH', { day:'numeric', month:'long', year:'numeric' });
        lucide.createIcons();
    }

    // สร้างช่องกรอกข้อมูลในหน้าแรก
    function renderInputPage() {
        const container = document.getElementById('input-list');
        container.innerHTML = Object.keys(RECIPES).map(name => `
            <div class="card-item flex items-center justify-between gap-4">
                <div class="flex-1">
                    <p class="text-white font-bold text-sm">${name}</p>
                    <p class="text-[10px] text-[#8a8a9a] uppercase">จำนวนที่ขายได้</p>
                </div>
                <div class="w-32">
                    <input type="number" id="val-${name}" class="input-box" placeholder="0" min="0" onwheel="this.blur()">
                </div>
            </div>
        `).join('');
    }

    function saveClosingReport() {
        let hasData = false;
        const reportDate = new Date();

        Object.keys(RECIPES).forEach(name => {
            const qty = parseInt(document.getElementById('val-'+name).value) || 0;
            if (qty > 0) {
                hasData = true;
                // บันทึกลงประวัติ
                salesHistory.push({ name, qty, date: reportDate });
                // ตัดสต๊อก
                const recipe = RECIPES[name];
                Object.entries(recipe).forEach(([ing, amt]) => {
                    INVENTORY[ing] -= (amt * qty);
                });
                // ล้างค่า
                document.getElementById('val-'+name).value = "";
            }
        });

        if (hasData) {
            alert("✨ บันทึกปิดยอดเรียบร้อย! ข้อมูลสต๊อกถูกตัดออกแล้ว");
            switchTab('history');
        } else {
            alert("กรุณากรอกยอดขายก่อนกดบันทึกครับ");
        }
    }

    function switchTab(tab) {
        ['report', 'stock', 'history', 'forecast'].forEach(t => {
            document.getElementById('page-'+t).classList.toggle('hidden', t !== tab);
            document.getElementById('btn-'+t).classList.toggle('tab-active', t === tab);
            if(t !== tab) document.getElementById('btn-'+t).classList.replace('text-[#8a8a9a]', 'text-[#8a8a9a]');
        });
        if(tab === 'stock') renderStock();
        if(tab === 'history') renderHistory();
        if(tab === 'forecast') renderForecast();
        lucide.createIcons();
    }

    function renderStock() {
        const container = document.getElementById('stock-list');
        container.innerHTML = Object.entries(INVENTORY).map(([ing, q]) => `
            <div class="bg-[#1a1a2e] p-4 rounded-xl flex justify-between items-center border border-[#2a2a3e]">
                <span class="text-[#8a8a9a] font-bold text-xs uppercase">${ing}</span>
                <span class="text-white font-black ${q < 100 ? 'text-[#e94560] animate-pulse' : ''}">${Math.max(0, q).toLocaleString()}</span>
            </div>
        `).join('');
    }

    function renderHistory() {
        const grouped = salesHistory.reduce((acc, curr) => {
            const d = new Date(curr.date).toLocaleDateString('th-TH', { day:'numeric', month:'short', year:'2-digit' });
            acc[d] = (acc[d] || 0) + curr.qty;
            return acc;
        }, {});
        
        document.getElementById('history-list').innerHTML = Object.entries(grouped).reverse().map(([date, total]) => `
            <div class="bg-[#1a1a2e] p-4 rounded-xl flex justify-between items-center border border-[#2a2a3e]">
                <span class="text-white font-bold text-sm">${date}</span>
                <span class="text-[#e94560] font-black">${total} แก้ว</span>
            </div>
        `).join('');
    }

    function renderForecast() {
        // พยากรณ์สำหรับ "วันพรุ่งนี้"
        const tomorrowIdx = (new Date().getDay() + 1) % 7;
        const tomorrowDayName = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'][tomorrowIdx];
        
        // คำนวณความต้องการวัตถุดิบเฉลี่ย (ตัวอย่าง)
        let needs = {};
        Object.keys(RECIPES).forEach(name => {
            const recipe = RECIPES[name];
            Object.entries(recipe).forEach(([ing, amt]) => {
                needs[ing] = (needs[ing] || 0) + (amt * 15); // สมมติค่าเฉลี่ย 15 แก้วต่อเมนู
            });
        });

        document.getElementById('shopping-list').innerHTML = Object.entries(needs).map(([ing, amount]) => {
            const current = INVENTORY[ing] || 0;
            const buy = Math.ceil(Math.max(0, amount - current));
            if(buy <= 0) return '';
            return `
                <div class="bg-[#1a1a2e] p-4 rounded-2xl border border-dashed border-[#e94560]/50 flex justify-between">
                    <span class="text-white font-bold text-xs">${ing}</span>
                    <span class="text-[#e94560] font-black text-xs">ซื้อเพิ่ม +${buy}</span>
                </div>
            `;
        }).join('');
    }

    function generateSampleHistory() {
        const data = [];
        for(let i=60; i>0; i--) {
            const d = new Date(); d.setDate(d.getDate()-i);
            Object.keys(RECIPES).forEach(m => data.push({ name: m, qty: 10 + Math.floor(Math.random()*20), date: d }));
        }
        salesHistory = data;
    }

    init();
  </script>
</body>
</html>
