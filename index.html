<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Coffee Ops Pro</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; }
    body { background: #fdfaf7; color: #3d3530; }
    .card-base { background: white; border: 1px solid #e8ddd2; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .tab-btn { padding: 12px 20px; transition: all 0.3s; border-bottom: 3px solid transparent; color: #a89685; font-weight: 600; white-space: nowrap; }
    .tab-active { border-bottom-color: #8b7355; color: #8b7355; background: rgba(139, 115, 85, 0.05); }
    .btn-action { background: #8b7355; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
    .btn-action:hover { opacity: 0.9; transform: translateY(-1px); }
    .input-num { border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px 10px; width: 100%; text-align: right; }
    .category-pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #e8ddd2; }
    .category-active { background: #8b7355; color: white; border-color: #8b7355; }
  </style>
</head>
<body class="p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
    <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
      <div>
        <h1 class="text-3xl font-bold text-[#8b7355]">AI Demand for Coffee Shop</h1>
        <p class="text-gray-500 text-sm">ระบบจัดการร้านและวิเคราะห์สต็อก</p>
      </div>
      <div class="flex gap-2">
        <button onclick="resetSystem()" class="text-xs text-red-500 hover:underline">ล้างข้อมูลทั้งหมด</button>
        <div id="last-update" class="text-xs bg-white px-4 py-2 rounded-full border border-gray-100 shadow-sm"></div>
      </div>
    </header>

    <nav class="flex overflow-x-auto border-b border-gray-200 mb-8 bg-white rounded-t-xl sticky top-0 z-10">
      <button onclick="switchTab('daily')" id="btn-daily" class="tab-btn tab-active">1. ขายประจำวัน</button>
      <button onclick="switchTab('stock')" id="btn-stock" class="tab-btn">2. เช็กสต็อก</button>
      <button onclick="switchTab('history')" id="btn-history" class="tab-btn">3. ยอดขายย้อนหลัง</button>
      <button onclick="switchTab('predict')" id="btn-predict" class="tab-btn">4. พยากรณ์ & จัดซื้อ</button>
    </nav>

    <div id="tab-daily" class="space-y-6">
      <div class="card-base p-6">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
          <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="shopping-cart"></i> บันทึกยอดขาย</h2>
          <div id="category-filters" class="flex flex-wrap gap-2">
             <span onclick="filterMenu('All')" class="category-pill category-active" id="cat-All">ทั้งหมด</span>
             <span onclick="filterMenu('Coffee')" class="category-pill" id="cat-Coffee">กาแฟ</span>
             <span onclick="filterMenu('Non-Coffee')" class="category-pill" id="cat-Non-Coffee">นม/ชา</span>
             <span onclick="filterMenu('Soda')" class="category-pill" id="cat-Soda">โซดา</span>
             <span onclick="filterMenu('Topping')" class="category-pill" id="cat-Topping">ท็อปปิ้ง</span>
          </div>
        </div>
        
        <div id="sales-inputs" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        
        <div class="mt-8 pt-6 border-t flex justify-end gap-4">
          <button onclick="clearInputs()" class="px-6 py-2 text-gray-500 font-bold hover:bg-gray-100 rounded-lg">ล้างค่า</button>
          <button onclick="processDailySales()" class="btn-action shadow-lg bg-[#8b7355]">
            <i data-lucide="check-circle"></i> บันทึกยอดและตัดสต็อก
          </button>
        </div>
      </div>
    </div>

    <div id="tab-stock" class="hidden space-y-6">
      <div class="card-base p-6">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="package"></i> ยอดสต็อกคงเหลือ</h2>
          <button onclick="updateInventoryFromCheck()" class="btn-action bg-green-600">อัปเดตสต็อกจากการนับจริง</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-gray-50 text-gray-600 uppercase text-xs">
              <tr>
                <th class="p-4">วัตถุดิบ</th>
                <th class="p-4">ในระบบ</th>
                <th class="p-4">เติมข้อมูลนับจริง</th>
                <th class="p-4">สถานะ</th>
              </tr>
            </thead>
            <tbody id="stock-table-body" class="divide-y divide-gray-100"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tab-history" class="hidden space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="card-base p-6 bg-blue-50 border-none text-blue-800">
          <p class="text-sm font-medium">มกราคม (แก้ว)</p>
          <p class="text-3xl font-bold" id="jan-total">0</p>
        </div>
        <div class="card-base p-6 bg-green-50 border-none text-green-800">
          <p class="text-sm font-medium">กุมภาพันธ์ (แก้ว)</p>
          <p class="text-3xl font-bold" id="feb-total">0</p>
        </div>
        <div class="card-base p-6 bg-orange-50 border-none text-orange-800">
          <p class="text-sm font-medium">มีนาคม (แก้ว)</p>
          <p class="text-3xl font-bold" id="mar-total">0</p>
        </div>
      </div>
      <div class="card-base p-6">
        <h2 class="text-xl font-bold mb-4">ยอดขายสะสมรายเมนู</h2>
        <div id="top-menus-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
      </div>
    </div>

    <div id="tab-predict" class="hidden space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="card-base p-6">
          <h2 class="text-xl font-bold mb-4 text-purple-700 flex items-center gap-2"><i data-lucide="sparkles"></i> พยากรณ์พรุ่งนี้ (เผื่อ 15%)</h2>
          <div id="forecast-list" class="space-y-2 max-h-96 overflow-y-auto pr-2"></div>
        </div>
        <div class="card-base p-6 border-red-200">
          <h2 class="text-xl font-bold mb-4 text-red-600 flex items-center gap-2"><i data-lucide="shopping-bag"></i> วัตถุดิบที่ต้องเตรียมซื้อ</h2>
          <div id="shopping-list" class="space-y-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- Configuration & Master Data ---
    const recipes = {
      "Espresso": {cat:"Coffee", "Cup (pc)": 1, "Lid (pc)": 1, "Straw (pc)": 1, "Ice (g)": 120, "Syrup (ml)": 30, "Coffee Bean (g)": 30},
      "Americano": {cat:"Coffee", "Cup (pc)": 1, "Lid (pc)": 1, "Straw (pc)": 1, "Ice (g)": 120, "Syrup (ml)": 30, "Coffee Bean (g)": 30},
      "Americano Honey": {cat:"Coffee", "Cup (pc)": 1, "Lid (pc)": 1, "Straw (pc)": 1, "Ice (g)": 120, "Syrup (ml)": 30, "Coffee Bean (g)": 30, "Honey (ml)": 30},
      "Latte": {cat:"Coffee", "Cup (pc)": 1, "Lid (pc)": 1, "Straw (pc)": 1, "Ice (g)": 120, "Syrup (ml)": 30, "Coffee Bean (g)": 30, "Fresh Milk (ml)": 180},
      "Mocha": {cat:"Coffee", "Cup (pc)": 1, "Lid (pc)": 1, "Straw (pc)": 1, "Ice (g)": 120, "Syrup (ml)": 30, "Coffee Bean (g)": 30, "Fresh Milk (ml)": 150, "Chocolate (ml)": 30},
      "Pure Matcha": {cat:"Non-Coffee", "Cup (pc)": 1, "Lid (pc)": 1, "Straw (pc)": 1, "Ice (g)": 120, "Syrup (ml)": 30, "Matcha (ml)": 50},
      "Thai Tea": {cat:"Non-Coffee", "Cup (pc)": 1, "Lid (pc)": 1, "Straw (pc)": 1, "Ice (g)": 120, "Syrup (ml)": 30, "Fresh Milk (ml)": 150, "Thai Tea (ml)": 80},
      "Orange Soda": {cat:"Soda", "Cup (pc)": 1, "Lid (pc)": 1, "Straw (pc)": 1, "Ice (g)": 120, "Syrup (ml)": 30, "Orange (ml)": 30, "Soda (ml)": 180},
      "Yuzu Soda": {cat:"Soda", "Cup (pc)": 1, "Lid (pc)": 1, "Straw (pc)": 1, "Ice (g)": 120, "Syrup (ml)": 30, "Yuzu (ml)": 30, "Soda (ml)": 180},
      "Topping Boba": {cat:"Topping", "Boba (g)": 60},
      "Topping Cream Cheese": {cat:"Topping", "Cream Cheese (g)": 40}
      // ... (เมนูอื่นๆ เพิ่มเติมได้ที่นี่)
    };

    let inventory = {
      "Cup (pc)": 1000, "Lid (pc)": 1000, "Straw (pc)": 1000, "Ice (g)": 50000, "Syrup (ml)": 10000,
      "Coffee Bean (g)": 5000, "Fresh Milk (ml)": 20000, "Thai Tea (ml)": 5000, "Chocolate (ml)": 3000, 
      "Matcha (ml)": 2000, "Honey (ml)": 2000, "Orange (ml)": 2000, "Yuzu (ml)": 1000, 
      "Soda (ml)": 15000, "Boba (g)": 5000, "Cream Cheese (g)": 2000
    };

    let histData = Object.keys(recipes).map(menu => ({
      menu: menu,
      jan: Math.floor(Math.random() * 100),
      feb: Math.floor(Math.random() * 100),
      mar: Math.floor(Math.random() * 100)
    }));

    // --- Core Functions ---

    function init() {
      loadLocalStorage();
      renderDailyInputs();
      renderStockTable();
      renderHistory();
      renderForecast();
      updateTimestamp();
      lucide.createIcons();
    }

    function saveLocalStorage() {
      localStorage.setItem('coffee_inventory', JSON.stringify(inventory));
      localStorage.setItem('coffee_history', JSON.stringify(histData));
      updateTimestamp();
    }

    function loadLocalStorage() {
      const savedStock = localStorage.getItem('coffee_inventory');
      const savedHist = localStorage.getItem('coffee_history');
      if (savedStock) inventory = JSON.parse(savedStock);
      if (savedHist) histData = JSON.parse(savedHist);
    }

    function resetSystem() {
      if(confirm("คำเตือน: ข้อมูลทั้งหมดจะถูกล้างและกลับไปเป็นค่าเริ่มต้น ยืนยันหรือไม่?")) {
        localStorage.clear();
        location.reload();
      }
    }

    function updateTimestamp() {
      document.getElementById('last-update').innerText = "อัปเดตล่าสุด: " + new Date().toLocaleTimeString();
    }

    function switchTab(tabId) {
      document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('tab-active'));
      document.getElementById('tab-' + tabId).classList.remove('hidden');
      document.getElementById('btn-' + tabId).classList.add('tab-active');
    }

    function filterMenu(category) {
      document.querySelectorAll('.category-pill').forEach(el => el.classList.remove('category-active'));
      document.getElementById('cat-' + category).classList.add('category-active');
      renderDailyInputs(category);
    }

    function renderDailyInputs(filter = 'All') {
      const container = document.getElementById('sales-inputs');
      container.innerHTML = "";
      Object.entries(recipes).forEach(([name, data]) => {
        if(filter !== 'All' && data.cat !== filter) return;
        container.innerHTML += `
          <div class="p-3 bg-gray-50 rounded-xl border border-gray-100 hover:border-[#8b7355] transition-colors">
            <label class="block text-[10px] font-bold text-gray-500 mb-1 truncate">${name}</label>
            <input type="number" id="sale-${name}" class="input-num text-md font-bold" placeholder="0" min="0">
          </div>
        `;
      });
    }

    function clearInputs() {
      document.querySelectorAll('#sales-inputs input').forEach(input => input.value = "");
    }

    function processDailySales() {
      let salesToProcess = [];
      let tempInventory = JSON.parse(JSON.stringify(inventory));

      // Check for validation and stock sufficiency
      for (const menu in recipes) {
        const input = document.getElementById(`sale-${menu}`);
        const qty = input ? parseInt(input.value) || 0 : 0;
        
        if(qty > 0) {
          for (let [ing, amt] of Object.entries(recipes[menu])) {
            if(ing === 'cat') continue;
            if(tempInventory[ing] !== undefined) {
              tempInventory[ing] -= (amt * qty);
              if(tempInventory[ing] < 0) {
                alert(`สต็อกไม่พอ! ${ing} ขาดอีก ${Math.abs(tempInventory[ing])}`);
                return;
              }
            }
          }
          salesToProcess.push({menu, qty});
        }
      }

      if(salesToProcess.length === 0) return alert("กรุณาระบุจำนวนยอดขาย");

      if(confirm(`ยืนยันการบันทึก ${salesToProcess.length} รายการ?`)) {
        inventory = tempInventory;
        // Update history (simplified: add to the latest month 'mar')
        salesToProcess.forEach(item => {
          let target = histData.find(h => h.menu === item.menu);
          if(target) target.mar += item.qty;
        });

        saveLocalStorage();
        alert("บันทึกสำเร็จและตัดสต็อกเรียบร้อย");
        clearInputs();
        renderStockTable();
        renderHistory();
        renderForecast();
      }
    }

    function renderStockTable() {
      const body = document.getElementById('stock-table-body');
      body.innerHTML = "";
      for (let [ing, qty] of Object.entries(inventory)) {
        const isLow = qty < 500; 
        const status = isLow ? '<span class="px-2 py-1 bg-red-100 text-red-600 rounded-md text-[10px] font-bold">ใกล้หมด</span>' : '<span class="text-green-500 text-[10px]">ปกติ</span>';
        body.innerHTML += `
          <tr>
            <td class="p-4 text-sm font-medium">${ing}</td>
            <td class="p-4 font-mono text-sm ${isLow ? 'text-red-600 font-bold' : ''}">${qty.toLocaleString()}</td>
            <td class="p-4"><input type="number" id="check-${ing}" class="input-num text-xs border-blue-50" placeholder="ระบุเลขใหม่"></td>
            <td class="p-4">${status}</td>
          </tr>
        `;
      }
    }

    function updateInventoryFromCheck() {
      let count = 0;
      for (let ing in inventory) {
        const val = document.getElementById(`check-${ing}`).value;
        if(val !== "") {
          inventory[ing] = parseInt(val);
          count++;
        }
      }
      if(count > 0) {
        saveLocalStorage();
        alert("อัปเดตสต็อกจริงแล้ว " + count + " รายการ");
        renderStockTable();
        renderForecast();
      }
    }

    function renderHistory() {
      let jT = 0, fT = 0, mT = 0;
      const list = document.getElementById('top-menus-list');
      list.innerHTML = "";
      histData.forEach(d => {
        jT += d.jan; fT += d.feb; mT += d.mar;
        list.innerHTML += `
          <div class="flex items-center justify-between p-3 bg-white border border-gray-50 rounded-lg shadow-sm">
            <span class="text-xs font-semibold">${d.menu}</span>
            <span class="text-sm font-bold text-[#8b7355]">${(d.jan + d.feb + d.mar).toLocaleString()} แก้ว</span>
          </div>
        `;
      });
      document.getElementById('jan-total').innerText = jT.toLocaleString();
      document.getElementById('feb-total').innerText = fT.toLocaleString();
      document.getElementById('mar-total').innerText = mT.toLocaleString();
    }

    function renderForecast() {
      const fList = document.getElementById('forecast-list');
      const sList = document.getElementById('shopping-list');
      fList.innerHTML = ""; sList.innerHTML = "";
      let totalUsageNeeded = {};

      histData.forEach(d => {
        const avg = Math.ceil((d.jan + d.feb + d.mar) / 90);
        const forecast = Math.ceil(avg * 1.15); 
        if(forecast > 0) {
           fList.innerHTML += `<div class="flex justify-between border-b border-gray-50 pb-1 text-xs"><span>${d.menu}</span><span class="font-bold text-purple-600">${forecast}</span></div>`;
           if(recipes[d.menu]) {
             for(let [ing, amt] of Object.entries(recipes[d.menu])) {
               if(ing !== 'cat') totalUsageNeeded[ing] = (totalUsageNeeded[ing] || 0) + (amt * forecast);
             }
           }
        }
      });

      let needsPurchase = false;
      for(let [ing, need] of Object.entries(totalUsageNeeded)) {
        if(inventory[ing] < (need * 3)) { // ถ้าสต็อกเหลือน้อยกว่าที่ต้องใช้ 3 วัน
          const buyAmt = Math.ceil((need * 7) - inventory[ing]); 
          if(buyAmt > 0) {
            needsPurchase = true;
            sList.innerHTML += `<div class="flex justify-between p-2 bg-red-50 rounded text-xs border border-red-100"><span>${ing}</span><span class="font-bold text-red-600">+ ${buyAmt.toLocaleString()}</span></div>`;
          }
        }
      }
      if(!needsPurchase) sList.innerHTML = "<div class='text-green-600 text-center py-10'><i data-lucide='smile' class='mx-auto mb-2'></i> สต็อกเพียงพอสำหรับสัปดาห์นี้</div>";
      lucide.createIcons();
    }

    window.onload = init;
  </script>
</body>
</html>
