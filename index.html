<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Coffee POS - History Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; }
    body { background-color: #0f0f23; color: #e0e0e8; }
    .tab-active { background: #e94560; color: white; border-radius: 12px; }
    .hide-scroll::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

  <header class="p-4 bg-[#1a1a2e] border-b border-[#2a2a3e] flex justify-between items-center">
    <div class="flex items-center gap-2">
        <div class="bg-[#e94560] p-1.5 rounded-lg"><i data-lucide="bar-chart-3" class="text-white w-5 h-5"></i></div>
        <h1 class="text-lg font-bold text-white tracking-tight">COFFEE ANALYTICS</h1>
    </div>
    <div id="date-now" class="text-[10px] text-[#8a8a9a] text-right"></div>
  </header>

  <nav class="flex p-2 bg-[#0f0f23] gap-1 overflow-x-auto hide-scroll">
    <button onclick="switchTab('menu')" id="btn-menu" class="flex-none px-4 py-2 text-xs font-bold tab-active">ขาย</button>
    <button onclick="switchTab('history')" id="btn-history" class="flex-none px-4 py-2 text-xs font-bold text-[#8a8a9a]">ประวัติขาย</button>
    <button onclick="switchTab('stock')" id="btn-stock" class="flex-none px-4 py-2 text-xs font-bold text-[#8a8a9a]">คลัง</button>
    <button onclick="switchTab('forecast')" id="btn-forecast" class="flex-none px-4 py-2 text-xs font-bold text-[#8a8a9a]">พยากรณ์</button>
  </nav>

  <main class="flex-1 overflow-y-auto p-4 pb-32">
    
    <div id="page-menu" class="grid grid-cols-2 gap-3"></div>

    <div id="page-history" class="hidden space-y-4">
        <h2 class="text-sm font-bold text-[#8a8a9a] uppercase">รายการยอดขายรายวัน</h2>
        <div id="history-list" class="space-y-2">
            </div>
    </div>

    <div id="history-modal" class="fixed inset-0 bg-black/80 hidden z-50 p-6 flex items-center justify-center">
        <div class="bg-[#1a1a2e] w-full max-w-sm rounded-3xl p-6 border border-[#2a2a3e]">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 id="modal-date" class="font-bold text-white text-lg"></h3>
                    <p class="text-[#e94560] text-sm font-bold">ยอดรวม: ฿<span id="modal-total">0</span></p>
                </div>
                <button onclick="closeModal()" class="text-[#8a8a9a]"><i data-lucide="x"></i></button>
            </div>
            <div id="modal-content" class="space-y-2 max-h-60 overflow-y-auto pr-2">
                </div>
        </div>
    </div>

    <div id="page-stock" class="hidden grid gap-2"></div>
    <div id="page-forecast" class="hidden space-y-4">
        <div id="chart-container" class="h-32 flex items-end gap-2 border-b border-[#2a2a3e] pb-2"></div>
        <div id="shopping-list" class="grid gap-2 text-xs"></div>
    </div>

  </main>

  <script>
    // --- Data (ย่อข้อมูลเพื่อให้ก๊อปง่าย) ---
    const INVENTORY = {"Coffee Bean":5000, "Fresh Milk":10000, "Syrup":5000, "Ice":20000, "Cup":500, "Lid":500, "Straw":500};
    const RECIPES = {
        "Espresso": {"Coffee Bean":1, "Fresh Milk":0.5, "Cup":1, "Lid":1, "Straw":1},
        "Americano": {"Coffee Bean":1, "Cup":1, "Lid":1, "Straw":1},
        "Thai Tea": {"Thai Tea":1, "Fresh Milk":1, "Cup":1, "Lid":1, "Straw":1}
    };
    const MENUS = Object.keys(RECIPES).map(name => ({ name, price: name.includes('Espresso') ? 50 : 60 }));
    let salesHistory = [];

    // --- 1. จำลองข้อมูล (เหมือนที่เคยทำ) ---
    function generateHistory() {
        const data = [];
        for(let i=60; i>=0; i--) {
            const d = new Date(); d.setDate(d.getDate()-i);
            const count = (d.getDay()===0 || d.getDay()===6) ? 50 : 25;
            for(let j=0; j<count; j++) {
                data.push({ name: MENUS[Math.floor(Math.random()*MENUS.length)].name, date: new Date(d.getTime()+(Math.random()*36000000)), qty: 1 });
            }
        }
        return data;
    }

    // --- 2. ฟีเจอร์หน้าประวัติรายวัน ---
    function renderHistoryPage() {
        const container = document.getElementById('history-list');
        // กลุ่มข้อมูลตามวัน
        const grouped = salesHistory.reduce((acc, curr) => {
            const dateStr = new Date(curr.date).toLocaleDateString('th-TH');
            if(!acc[dateStr]) acc[dateStr] = { total: 0, items: {} };
            acc[dateStr].total += 1;
            acc[dateStr].items[curr.name] = (acc[dateStr].items[curr.name] || 0) + 1;
            return acc;
        }, {});

        container.innerHTML = Object.entries(grouped).reverse().map(([date, data]) => `
            <div onclick="showDayDetail('${date}')" class="bg-[#1a1a2e] p-4 rounded-xl flex justify-between items-center border border-[#2a2a3e] active:scale-95 transition cursor-pointer">
                <div>
                    <p class="text-white font-bold text-sm">${date}</p>
                    <p class="text-[10px] text-[#8a8a9a]">${data.total} ออเดอร์</p>
                </div>
                <i data-lucide="chevron-right" class="text-[#e94560] w-4 h-4"></i>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function showDayDetail(dateStr) {
        const grouped = salesHistory.reduce((acc, curr) => {
            const d = new Date(curr.date).toLocaleDateString('th-TH');
            if(!acc[d]) acc[d] = { items: {} };
            acc[d].items[curr.name] = (acc[d].items[curr.name] || 0) + 1;
            return acc;
        }, {});

        const dayData = grouped[dateStr];
        document.getElementById('modal-date').innerText = dateStr;
        
        let grandTotal = 0;
        document.getElementById('modal-content').innerHTML = Object.entries(dayData.items).map(([name, qty]) => {
            const price = MENUS.find(m => m.name === name).price;
            grandTotal += (price * qty);
            return `
                <div class="flex justify-between text-sm py-2 border-b border-white/5">
                    <span class="text-[#8a8a9a]">${qty}x <span class="text-white">${name}</span></span>
                    <span class="text-white">฿${(price * qty).toLocaleString()}</span>
                </div>
            `;
        }).join('');
        
        document.getElementById('modal-total').innerText = grandTotal.toLocaleString();
        document.getElementById('history-modal').classList.remove('hidden');
        lucide.createIcons();
    }

    function closeModal() {
        document.getElementById('history-modal').classList.add('hidden');
    }

    // --- 3. ระบบควบคุมหน้าจอ (Tabs) ---
    function switchTab(tab) {
        const pages = ['menu', 'history', 'stock', 'forecast'];
        pages.forEach(p => {
            document.getElementById('page-'+p).classList.toggle('hidden', p !== tab);
            document.getElementById('btn-'+p).className = p === tab ? "flex-none px-4 py-2 text-xs font-bold tab-active" : "flex-none px-4 py-2 text-xs font-bold text-[#8a8a9a]";
        });
        if(tab === 'history') renderHistoryPage();
        if(tab === 'stock') renderStock();
        if(tab === 'forecast') renderForecast();
        lucide.createIcons();
    }

    // (ส่วนฟังก์ชัน Stock/Menu/Forecast ใช้ Logic เดิมจากคำตอบก่อนหน้า)
    function renderMenu() {
        document.getElementById('page-menu').innerHTML = MENUS.map(m => `
            <div class="bg-[#1a1a2e] p-4 rounded-xl text-center border border-[#2a2a3e]">
                <p class="text-white font-bold text-xs">${m.name}</p>
                <p class="text-[#e94560] font-bold text-sm">฿${m.price}</p>
            </div>
        `).join('');
    }

    function renderStock() {
        document.getElementById('page-stock').innerHTML = Object.entries(INVENTORY).map(([ing, q]) => `
            <div class="bg-[#1a1a2e] p-3 rounded-lg flex justify-between text-xs">
                <span>${ing}</span><span class="font-bold text-[#e94560]">${q}</span>
            </div>
        `).join('');
    }

    function renderForecast() {
        document.getElementById('chart-container').innerHTML = `<p class="text-[10px] text-[#8a8a9a] w-full text-center">วิเคราะห์จากประวัติ 60 วัน...</p>`;
    }

    // Initial Load
    salesHistory = generateHistory();
    renderMenu();
    document.getElementById('date-now').innerText = new Date().toLocaleDateString('th-TH',{weekday:'long', day:'numeric', month:'short'});
    lucide.createIcons();

  </script>
</body>
</html>
